{% extends "base.html" %} 
 
{% block content %} 
<div class="min-h-[75vh] flex items-center justify-center py-12 px-6"> 
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-2xl border 
border-slate-100"> 
         
        <div class="text-center"> 
            <div class="mx-auto h-16 w-16 rounded-2xl bg-emerald-50 text-emerald-600 flex items-center 
justify-center text-2xl mb-4"> 
                <i class="fa-solid fa-ticket"></i> 
            </div> 
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">Reservar Cita</h2> 
            <p class="mt-2 text-sm text-slate-500"> 
                Genera tu código QR en el servidor y recíbelo por WhatsApp usando Twilio. 
            </p> 
        </div> 
 
        <form class="space-y-6" action="/reservar" method="POST"> 
            <div class="space-y-4"> 
                <div> 
                    <label for="nombre" class="block text-sm font-bold text-slate-700 mb-1">Nombre 
Completo</label> 
                    <input id="nombre" name="nombre" type="text" required  
                           class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none 
focus:ring-2 focus:ring-indigo-500 text-sm"  
                           placeholder="Ej: Claudia Natalia"> 
                </div> 
 
                <div> 
                    <label for="telefono" class="block text-sm font-bold text-slate-700 mb-1">Número de 
WhatsApp</label> 
                    <input id="telefono" name="telefono" type="tel" required  
                           class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none 
focus:ring-2 focus:ring-indigo-500 text-sm"  
                           placeholder="Ej: +573001234567"> 
                    <p class="mt-1.5 text-[11px] text-slate-400 leading-snug"> 
                        
⚠
 Obligatorio incluir el prefijo de país con el signo <b>+</b> (ej: +57 para Colombia). 
                    </p> 
                </div> 
 
                <div> 
                    <label for="servicio" class="block text-sm font-bold text-slate-700 mb-1">Servicio a 
Reservar</label> 
                    <select id="servicio" name="servicio" required 
                            class="block w-full px-4 py-3 border border-slate-200 bg-white rounded-xl 
text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"> 
                        <option value="" disabled selected>Selecciona una opción...</option> 
                        <option value="Mentoría Python y APIs">Mentoría Python y APIs 


</option> 
                        <option value="Taller de Despliegue Express">Taller de Despliegue Express 


</option> 
                        <option value="Asesoría UI/UX Avanzada">Asesoría UI/UX Avanzada 


</option> 
                    </select> 
                </div> 
            </div> 
 
            <button type="submit"  
                    class="w-full flex justify-center items-center gap-2 py-4 px-4 border border-transparent 
text-sm font-black rounded-xl text-white bg-emerald-600 hover:bg-emerald-700 transition-all 
shadow-lg shadow-emerald-100"> 
                <i class="fa-brands fa-whatsapp text-lg"></i> 
                Confirmar Reserva y Enviar QR 
            </button> 
        </form> 
         
    </div> 
</div> 
{% endblock %}
