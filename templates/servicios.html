{% extends "base.html" %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">Servicios</h1>

{% for s in servicios %}
    <div class="bg-white p-4 mb-2 shadow">
        <h3>{{ s.nombre }}</h3>
        <p>Precio: ${{ s.precio }}</p>

        {% if s.disponible %}
            <p>✅ Disponible</p>
        {% else %}
            <p>❌ No disponible</p>
        {% endif %}
    </div>
{% endfor %}

{% endblock %}
